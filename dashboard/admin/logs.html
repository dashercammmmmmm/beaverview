<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Audit Logs — BeaverView Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<nav class="admin-nav">
  <a class="admin-nav__logo" href="/admin/">⚙ BeaverView Admin</a>
  <div class="admin-nav__links">
    <a href="/admin/">Dashboard</a>
    <a href="/admin/rooms.html">Rooms</a>
    <a href="/admin/logs.html" class="active">Logs</a>
    <a href="/admin/connectors.html">Connectors</a>
    <a href="/admin/users.html">Users</a>
  </div>
  <div class="admin-nav__spacer"></div>
  <span class="admin-nav__user" id="nav-username"></span>
  <a class="admin-nav__back" href="/">← Dashboard</a>
</nav>

<div class="admin-layout">
  <main class="admin-main" id="main" style="display:none">

    <div class="page-header">
      <h1>Audit Logs</h1>
      <button class="btn btn--secondary" id="btn-export">⬇ Export CSV</button>
    </div>

    <!-- Filter bar -->
    <div class="filter-bar">
      <div class="form-group">
        <label>Campus</label>
        <select class="form-control" id="f-campus">
          <option value="">All campuses</option>
          <option value="corvallis">Corvallis</option>
          <option value="cascades">Cascades</option>
          <option value="hatfield">Hatfield</option>
        </select>
      </div>
      <div class="form-group">
        <label>Room ID</label>
        <input class="form-control" id="f-room" placeholder="e.g. corvallis-kad-101">
      </div>
      <div class="form-group">
        <label>User</label>
        <input class="form-control" id="f-user" placeholder="username">
      </div>
      <div class="form-group">
        <label>Action type</label>
        <input class="form-control" id="f-action" placeholder="e.g. admin_room_updated">
      </div>
      <div class="form-group">
        <label>From</label>
        <input class="form-control" id="f-from" type="date">
      </div>
      <div class="form-group">
        <label>To</label>
        <input class="form-control" id="f-to" type="date">
      </div>
      <button class="btn btn--primary" id="btn-search">Search</button>
      <button class="btn btn--secondary" id="btn-reset">Reset</button>
    </div>

    <!-- Results -->
    <div class="card" style="padding:0">
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Timestamp</th><th>User</th><th>Campus</th><th>Room</th>
            <th>Action</th><th>Target</th><th>Outcome</th>
          </tr></thead>
          <tbody id="log-body">
            <tr><td colspan="7" style="text-align:center;color:#888;padding:1.5rem">Use the filters above to search the log.</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- Pagination -->
    <div class="pagination">
      <span class="pagination__info" id="page-info"></span>
      <button class="btn btn--secondary btn--sm" id="btn-prev" disabled>‹ Prev</button>
      <button class="btn btn--secondary btn--sm" id="btn-next" disabled>Next ›</button>
    </div>

    <!-- Archive / Purge -->
    <div class="card" style="margin-top:1.5rem">
      <div class="card__title">Log Maintenance</div>
      <div style="display:flex;flex-wrap:wrap;gap:1.5rem;align-items:flex-end">
        <div>
          <label style="display:block;font-weight:500;margin-bottom:.3rem;font-size:.85rem">
            Archive entries older than
          </label>
          <div style="display:flex;gap:.5rem;align-items:center">
            <input class="form-control" id="archive-days" type="number" value="90" min="7" style="width:90px">
            <span style="font-size:.85rem">days</span>
            <button class="btn btn--warning btn--sm" id="btn-archive">Archive</button>
          </div>
        </div>
        <div>
          <div class="banner banner--danger" style="margin-bottom:.5rem">
            ⚠ Purge permanently deletes archived entries. Type <strong>CONFIRM</strong> to proceed.
          </div>
          <div style="display:flex;gap:.5rem;align-items:center">
            <input class="form-control" id="purge-confirm" placeholder="Type CONFIRM" style="width:150px">
            <input class="form-control" id="purge-days" type="number" value="90" min="7" style="width:90px">
            <span style="font-size:.85rem">days</span>
            <button class="btn btn--danger btn--sm" id="btn-purge">Purge</button>
          </div>
        </div>
      </div>
      <p id="maintenance-msg" style="margin-top:.75rem;font-size:.85rem;color:#666"></p>
    </div>

  </main>
</div>

<script src="admin.js"></script>
<script src="logs-page.js"></script>
</body>
</html>
