<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connectors — BeaverView Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<nav class="admin-nav">
  <a class="admin-nav__logo" href="/admin/">⚙ BeaverView Admin</a>
  <div class="admin-nav__links">
    <a href="/admin/">Dashboard</a>
    <a href="/admin/rooms.html">Rooms</a>
    <a href="/admin/logs.html">Logs</a>
    <a href="/admin/connectors.html" class="active">Connectors</a>
    <a href="/admin/users.html">Users</a>
  </div>
  <div class="admin-nav__spacer"></div>
  <span class="admin-nav__user" id="nav-username"></span>
  <a class="admin-nav__back" href="/">← Dashboard</a>
</nav>

<div class="admin-layout">
  <main class="admin-main" id="main" style="display:none">

    <div class="page-header">
      <h1>Connector Management</h1>
      <button class="btn btn--secondary btn--sm" id="btn-refresh">↺ Refresh</button>
    </div>

    <div class="banner banner--info">
      <span>ℹ</span>
      <span>Credentials stay in <code>.env</code> on the server — never stored in the database.
      To change a credential, SSH into the server and edit <code>/home/beaverview/app/api/.env</code>,
      then restart BeaverView.</span>
    </div>

    <div id="warning-banner" class="banner banner--warning" style="display:none">
      <span>⚠</span><span id="warning-msg"></span>
    </div>

    <div id="connector-grid" class="connector-grid">
      <p style="color:#888;padding:.5rem 0">Loading connectors…</p>
    </div>

  </main>
</div>

<script src="admin.js"></script>
<script src="connectors-page.js"></script>
</body>
</html>
