<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeaverView Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<nav class="admin-nav">
  <a class="admin-nav__logo" href="/admin/">⚙ BeaverView Admin</a>
  <div class="admin-nav__links">
    <a href="/admin/" class="active">Dashboard</a>
    <a href="/admin/rooms.html">Rooms</a>
    <a href="/admin/logs.html">Logs</a>
    <a href="/admin/connectors.html">Connectors</a>
    <a href="/admin/users.html">Users</a>
  </div>
  <div class="admin-nav__spacer"></div>
  <span class="admin-nav__user" id="nav-username"></span>
  <a class="admin-nav__back" href="/">← Dashboard</a>
</nav>

<div class="admin-layout">
  <main class="admin-main" id="main" style="display:none">

    <div class="page-header">
      <h1>Summary Dashboard</h1>
      <span id="last-refresh" style="font-size:.8rem;color:#888"></span>
    </div>

    <!-- Stat cards -->
    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-card__value" id="stat-rooms">—</div><div class="stat-card__label">Total Rooms</div></div>
      <div class="stat-card"><div class="stat-card__value" id="stat-active">—</div><div class="stat-card__label">Active Now</div></div>
      <div class="stat-card"><div class="stat-card__value" id="stat-incidents">—</div><div class="stat-card__label">Open Incidents</div></div>
      <div class="stat-card"><div class="stat-card__value" id="stat-actions7">—</div><div class="stat-card__label">Actions (7 days)</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem">

      <!-- Top rooms -->
      <div class="card">
        <div class="card__title">Busiest Rooms (7 days)</div>
        <table><thead><tr><th>Room</th><th>Actions</th></tr></thead>
        <tbody id="top-rooms"></tbody></table>
      </div>

      <!-- Top actions -->
      <div class="card">
        <div class="card__title">Most-Used Actions (7 days)</div>
        <table><thead><tr><th>Action</th><th>Count</th></tr></thead>
        <tbody id="top-actions"></tbody></table>
      </div>

    </div>

    <!-- Recent activity feed -->
    <div class="card">
      <div class="card__title">Recent Activity <small style="font-weight:400;text-transform:none;letter-spacing:0">(auto-refreshes every 60 s)</small></div>
      <ul class="feed" id="activity-feed"></ul>
    </div>

    <!-- Connector health grid -->
    <div class="card">
      <div class="card__title">Connector Health</div>
      <div id="connector-health" class="connector-grid"></div>
    </div>

  </main>
</div>

<script src="admin.js"></script>
<script src="index-page.js"></script>
</body>
</html>
