<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rooms — BeaverView Admin</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

<nav class="admin-nav">
  <a class="admin-nav__logo" href="/admin/">⚙ BeaverView Admin</a>
  <div class="admin-nav__links">
    <a href="/admin/">Dashboard</a>
    <a href="/admin/rooms.html" class="active">Rooms</a>
    <a href="/admin/logs.html">Logs</a>
    <a href="/admin/connectors.html">Connectors</a>
    <a href="/admin/users.html">Users</a>
  </div>
  <div class="admin-nav__spacer"></div>
  <span class="admin-nav__user" id="nav-username"></span>
  <a class="admin-nav__back" href="/">← Dashboard</a>
</nav>

<div class="admin-layout">

  <!-- Sidebar: campus + building list -->
  <aside class="admin-sidebar" id="sidebar">
    <div style="padding:.5rem 1rem .75rem;font-weight:700;font-size:.85rem;border-bottom:1px solid var(--border);margin-bottom:.5rem">
      Buildings
    </div>
    <ul class="sidebar-list" id="building-list"><li style="padding:.75rem 1.25rem;color:#888">Loading…</li></ul>
    <div style="padding:.75rem 1rem">
      <button class="btn btn--secondary btn--sm" id="btn-add-building" style="width:100%">+ Add Building</button>
    </div>
  </aside>

  <main class="admin-main" id="main" style="display:none">

    <div class="page-header">
      <h1 id="room-list-title">Select a building</h1>
      <button class="btn btn--primary btn--sm" id="btn-add-room" style="display:none">+ Add Room</button>
    </div>

    <div class="table-wrap">
      <table id="rooms-table" style="display:none">
        <thead><tr>
          <th>Room #</th><th>Type</th><th>Status</th><th>Health</th>
          <th>Processor</th><th>Devices</th><th>Actions</th>
        </tr></thead>
        <tbody id="rooms-body"></tbody>
      </table>
      <p id="rooms-empty" style="color:#888;padding:1rem 0;display:none">No rooms in this building.</p>
    </div>

  </main>
</div>

<!-- Room edit drawer -->
<div class="drawer-overlay" id="drawer-overlay"></div>
<aside class="drawer" id="room-drawer">
  <div class="drawer__header">
    <span id="drawer-title">Edit Room</span>
    <button class="drawer__close" id="drawer-close">✕</button>
  </div>
  <div class="drawer__body">
    <form id="room-form">
      <input type="hidden" id="f-room-id">
      <input type="hidden" id="f-building-id">
      <div class="form-row">
        <div class="form-group">
          <label>Room Number *</label>
          <input class="form-control" id="f-number" required maxlength="20">
        </div>
        <div class="form-group">
          <label>Type</label>
          <input class="form-control" id="f-type" maxlength="80" placeholder="e.g. Classroom">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Status</label>
          <select class="form-control" id="f-status">
            <option value="offline">Offline</option>
            <option value="available">Available</option>
            <option value="in-use">In Use</option>
            <option value="issue">Issue</option>
          </select>
        </div>
        <div class="form-group">
          <label>Health (0–100)</label>
          <input class="form-control" id="f-health" type="number" min="0" max="100" value="0">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Processor</label>
          <select class="form-control" id="f-processor">
            <option value="mock">Mock</option>
            <option value="online">Online</option>
            <option value="offline">Offline</option>
            <option value="error">Error</option>
          </select>
        </div>
        <div class="form-group">
          <label>Display</label>
          <select class="form-control" id="f-display">
            <option value="unknown">Unknown</option>
            <option value="on">On</option>
            <option value="off">Off</option>
            <option value="standby">Standby</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Active Event</label>
        <input class="form-control" id="f-active-event" maxlength="200">
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea class="form-control" id="f-notes" rows="2" maxlength="500"></textarea>
      </div>
      <div style="display:flex;gap:1.5rem;margin-bottom:.9rem">
        <label class="form-check"><input type="checkbox" id="f-screenconnect"> ScreenConnect</label>
        <label class="form-check"><input type="checkbox" id="f-wattbox"> WattBox</label>
        <label class="form-check"><input type="checkbox" id="f-hybrid"> Hybrid</label>
        <label class="form-check"><input type="checkbox" id="f-stale"> Stale</label>
      </div>

      <!-- Devices -->
      <div class="card__title" style="margin-bottom:.5rem">Devices</div>
      <table class="devices-table">
        <thead><tr><th>Type</th><th>Manufacturer</th><th>Model</th><th>Connection</th><th></th></tr></thead>
        <tbody id="devices-body"></tbody>
      </table>
      <button type="button" class="btn btn--secondary btn--sm" id="btn-add-device" style="margin-top:.5rem">+ Add Device</button>
    </form>
  </div>
  <div class="drawer__footer">
    <button class="btn btn--danger btn--sm" id="btn-delete-room" style="margin-right:auto;display:none">Delete Room</button>
    <button class="btn btn--secondary" id="btn-cancel">Cancel</button>
    <button class="btn btn--primary" id="btn-save">Save</button>
  </div>
</aside>

<!-- Building dialog -->
<div class="drawer-overlay" id="bldg-overlay"></div>
<aside class="drawer" id="bldg-drawer" style="width:360px">
  <div class="drawer__header">
    <span id="bldg-drawer-title">Add Building</span>
    <button class="drawer__close" id="bldg-close">✕</button>
  </div>
  <div class="drawer__body">
    <input type="hidden" id="b-id">
    <div class="form-group">
      <label>Campus *</label>
      <select class="form-control" id="b-campus"></select>
    </div>
    <div class="form-group">
      <label>Building Code * <small>(e.g. KAd, LINC)</small></label>
      <input class="form-control" id="b-code" maxlength="20" required>
    </div>
    <div class="form-group">
      <label>Building Name *</label>
      <input class="form-control" id="b-name" maxlength="200" required>
    </div>
  </div>
  <div class="drawer__footer">
    <button class="btn btn--danger btn--sm" id="btn-delete-building" style="margin-right:auto;display:none">Delete Building</button>
    <button class="btn btn--secondary" id="btn-bldg-cancel">Cancel</button>
    <button class="btn btn--primary" id="btn-bldg-save">Save</button>
  </div>
</aside>

<script src="admin.js"></script>
<script src="rooms-page.js"></script>
</body>
</html>
